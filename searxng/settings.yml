# SearXNG settings for the local web-search backend used by LiteLLM.
# Started by process-compose; point SEARXNG_SETTINGS_PATH at this file.
#
# Design notes (see AGENTS.md):
#   - Bound to localhost only, so the bot limiter is unnecessary — disabling it
#     removes SearXNG's only reason to need Redis (one fewer process, less RAM).
#   - secret_key is supplied at runtime via the SEARXNG_SECRET env var
#     (generated by scripts/setup.sh into .envrc.local), keeping secrets out of
#     the repo. The empty value below is overridden by that env var.

use_default_settings: true

general:
  debug: false               # WARNING-level logs only — keeps log volume low

server:
  bind_address: "127.0.0.1"  # never publicly exposed
  port: 8888
  secret_key: ""             # overridden by $SEARXNG_SECRET at runtime
  limiter: false             # no public bot protection needed → no Redis
  image_proxy: false         # image proxying is the main memory sink — keep off

search:
  formats:
    - html
    - json                   # LiteLLM's searxng backend requires the JSON API
