model_list:
  # AWS Bedrock — latest opus, sonnet, haiku, Kimi (us. cross-region profiles)
  # Auth: LiteLLM reads the bearer token from the AWS_BEARER_TOKEN_BEDROCK
  # env var automatically; it is not a valid litellm_param.
  - model_name: claude-opus-4-8-bedrock
    litellm_params:
      model: bedrock/us.anthropic.claude-opus-4-8
      aws_region_name: os.environ/AWS_REGION

  - model_name: claude-sonnet-4-6-bedrock
    litellm_params:
      model: bedrock/us.anthropic.claude-sonnet-4-6
      aws_region_name: os.environ/AWS_REGION

  - model_name: claude-haiku-4-5-20251001-bedrock
    litellm_params:
      model: bedrock/us.anthropic.claude-haiku-4-5-20251001-v1:0
      aws_region_name: os.environ/AWS_REGION

  - model_name: kimi-k2.5-bedrock
    litellm_params:
      model: bedrock/moonshotai.kimi-k2.5
      aws_region_name: os.environ/AWS_REGION
      # Bedrock's Kimi rejects the `thinking` param that clients may send;
      # drop unsupported params for this model only (Anthropic models keep them).
      drop_params: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: true
  store_prompts_in_spend_logs: true

litellm_settings:
  max_budget: 50.0
  budget_duration: 30d
  maximum_spend_logs_retention_period: "7d"     # delete logs older than 7 days
  maximum_spend_logs_retention_interval: "1d"   # run the cleanup job daily

  # Intercept Claude Code's native web_search tool and run it server-side against
  # the local SearXNG instance, so Bedrock-hosted models gain web search.
  callbacks: ["websearch_interception"]
  websearch_interception_params:
    enabled_providers:
      - bedrock                # covers every model above
    search_tool_name: local-search

# SearXNG runs locally (see searxng/settings.yml, started by process-compose).
# api_base is the gateway-internal URL; no API key — it's a self-hosted backend.
# NOTE: the websearch_interception callback does NOT read this api_base — it
# resolves SearXNG from the SEARXNG_API_BASE env var (set in .envrc.local).
# Both must point at the same URL; the api_base below covers the search_tools
# code path, SEARXNG_API_BASE covers the interception code path.
search_tools:
  - search_tool_name: local-search
    litellm_params:
      search_provider: searxng
      api_base: http://127.0.0.1:8888
