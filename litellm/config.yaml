model_list:
  # Anthropic API
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  # AWS Bedrock
  - model_name: claude-3-5-sonnet-bedrock
    litellm_params:
      model: bedrock/anthropic.claude-3-5-sonnet-20241022-v2:0
      aws_bearer_token: os.environ/AWS_BEARER_TOKEN_BEDROCK
      aws_region_name: os.environ/AWS_REGION

  - model_name: claude-3-5-haiku-bedrock
    litellm_params:
      model: bedrock/anthropic.claude-3-5-haiku-20241022-v1:0
      aws_bearer_token: os.environ/AWS_BEARER_TOKEN_BEDROCK
      aws_region_name: os.environ/AWS_REGION

  - model_name: claude-opus-4-bedrock
    litellm_params:
      model: bedrock/us.anthropic.claude-opus-4-5-20251001-v1:0
      aws_bearer_token: os.environ/AWS_BEARER_TOKEN_BEDROCK
      aws_region_name: os.environ/AWS_REGION

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

litellm_settings:
  max_budget: 50.0
  budget_duration: 30d
